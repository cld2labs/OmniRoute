services:
  api:
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./server:/app/server
    environment:
      - PYTHONPATH=/app/server

  data-engine:
    command: python -m api.services.data_engine.main run
    volumes:
      - ./server:/app/server
    environment:
      - PYTHONPATH=/app/server

  web:
    volumes:
      - ./client:/app
      - omniroute_web_node_modules:/app/node_modules

volumes:
  omniroute_web_node_modules:
