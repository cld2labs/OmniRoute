services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: omniroute-postgres
    environment:
      POSTGRES_DB: omnroute
      POSTGRES_USER: omnroute
      POSTGRES_PASSWORD: omnroute
    ports:
      - '5432:5432'
    volumes:
      - omniroute_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U omnroute -d omnroute']
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: server/api/Dockerfile
    container_name: omniroute-api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8000:8000'

  data-engine:
    build:
      context: .
      dockerfile: server/api/Dockerfile
    profiles: ['simulation']
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m api.services.data_engine.main run
    environment:
      DATA_ENGINE_MODE: run
      DATA_ENGINE_TICK_INTERVAL_SECONDS: 30
      DATA_ENGINE_SEED_IF_EMPTY: 'true'
      DATA_ENGINE_SEED_ROUTES: 6
      DATA_ENGINE_SEED_DAYS: 3
      DATA_ENGINE_BOOKING_RATE_PER_TICK: 3.0
      DATA_ENGINE_CANCELLATION_RATE_PER_TICK: 0.8
      DATA_ENGINE_INCIDENT_RATE_PER_TICK: 0.4
      DATA_ENGINE_DELAY_SENSITIVITY: 1.0
      DATA_ENGINE_ENABLE_CASCADING_DELAYS: 'true'

  web:
    build:
      context: .
      dockerfile: client/Dockerfile
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    container_name: omniroute-web
    depends_on:
      api:
        condition: service_started
    ports:
      - '5173:5173'

volumes:
  omniroute_pgdata:
